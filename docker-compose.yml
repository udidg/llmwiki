services:

  bot:
    image: ghcr.io/udidg/llmwiki/llm-wiki-bot:latest
    env_file: .env
    environment:
      # Points to Ollama running natively on the host (not in Docker)
      OLLAMA_BASE_URL: http://host-gateway:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
      DATA_DIR: /data
    volumes:
      - wiki_data:/data
    extra_hosts:
      - "host-gateway:host-gateway"
    restart: unless-stopped

volumes:
  wiki_data:
