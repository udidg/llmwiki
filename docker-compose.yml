services:

  bot:
    image: ghcr.io/udidg/llmwiki/llm-wiki-bot:latest
    env_file: .env
    environment:
      # Ollama runs natively on the host; host network mode makes localhost work
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
      DATA_DIR: /data
    volumes:
      - wiki_data:/data
    network_mode: host
    restart: unless-stopped

volumes:
  wiki_data:
